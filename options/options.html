<!-- options/options.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>POTTS Settings</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #080b0f; color: #dce8f0; max-width: 600px; margin: 40px auto; padding: 20px;}
        h1 { color: #00e5ff; }
        .group { background: #111820; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 10px; background: #0d1117; border: 1px solid #7a8fa8;
            color: #fff; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px;
        }
        button { background: #00e5ff; color: #000; border: none; padding: 12px 24px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .help { font-size: 12px; color: #7a8fa8; margin-bottom: 10px; display: block; }
        #status { color: #00e676; margin-left: 15px; font-style: italic;}
    </style>
</head>
<body>
    <h1>POTTS Parameters</h1>
    
    <div class="group">
        <h2>API Integration</h2>
        <label>Google Gemini API Key (1.5 Flash Free Tier)</label>
        <span class="help">Required for intelligence features. Get from aistudio.google.com</span>
        <input type="password" id="geminiKey" placeholder="AIzaSy...">
        
        <label>GNews API Key (Optional)</label>
        <span class="help">Used for morning briefing headlines.</span>
        <input type="password" id="gnewsKey" placeholder="News API key">
    </div>

    <div class="group">
        <h2>Preference</h2>
        <label>Title Override</label>
        <span class="help">How POTTS should address you. (Default: Sir)</span>
        <input type="text" id="userName" placeholder="Sir / Ma'am / Boss">
    </div>

    <button id="saveBtn">Save Configuration</button>
    <span id="status"></span>
    
    <script src="options.js"></script>
</body>
</html>
