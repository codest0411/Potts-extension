    <text x="580" y="190"
      font-family="'Courier New', Courier, monospace"
      font-size="10" fill="#fbbf24" letter-spacing="1.5">AI.ROUTING</text>

    <!-- P.O.T.T.S. title -->
    <text x="340" y="199" text-anchor="middle"
      font-family="'Courier New', Courier, monospace"
      font-size="34" font-weight="700" fill="#00dcff"
      letter-spacing="18" opacity="0.95">P.O.T.T.S.</text>

    <!-- Corner brackets -->
    <path d="M18 18 L18 38 M18 18 L38 18" fill="none" stroke="#00dcff" stroke-width="1" opacity="0.35"/>
    <path d="M662 18 L662 38 M662 18 L642 18" fill="none" stroke="#00dcff" stroke-width="1" opacity="0.35"/>
    <path d="M18 202 L18 182 M18 202 L38 202" fill="none" stroke="#00dcff" stroke-width="1" opacity="0.35"/>
    <path d="M662 202 L662 182 M662 202 L642 202" fill="none" stroke="#00dcff" stroke-width="1" opacity="0.35"/>

