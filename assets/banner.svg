    <line x1="170" y1="105" x2="170" y2="111" stroke="#00dcff" stroke-width="0.6" opacity="0.3"/>
    <line x1="210" y1="104" x2="210" y2="112" stroke="#00dcff" stroke-width="0.6" opacity="0.3"/>
    <line x1="240" y1="105" x2="240" y2="111" stroke="#00dcff" stroke-width="0.6" opacity="0.3"/>

